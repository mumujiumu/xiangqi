<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>中国象棋 · 楚河汉界</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 开始界面：模式选择 -->
    <div class="menu-screen" id="menuScreen">
        <div class="menu-card">
            <h1>中 国 象 棋</h1>
            <p class="menu-subtitle">楚河汉界 · 见招拆招</p>
            <div class="menu-modes">
                <button class="mode-btn" id="modePvp">
                    <span class="mode-icon">⚔</span>
                    <span class="mode-name">双人对战</span>
                    <span class="mode-desc">同屏人机对战</span>
                </button>
                <button class="mode-btn" id="modePve">
                    <span class="mode-icon">🤖</span>
                    <span class="mode-name">人机对战</span>
                    <span class="mode-desc">挑战AI</span>
                </button>
                <button class="mode-btn" id="modeBluetooth">
                    <span class="mode-icon">📡</span>
                    <span class="mode-name">蓝牙对战</span>
                    <span class="mode-desc">远程对战</span>
                </button>
            </div>
        </div>
    </div>

    <!-- AI 难度选择界面 -->
    <div class="menu-screen hidden" id="difficultyScreen">
        <div class="menu-card">
            <h2>选择难度</h2>
            <div class="menu-modes">
                <button class="mode-btn" data-difficulty="1">
                    <span class="mode-name">简单</span>
                    <span class="mode-desc">适合新手</span>
                </button>
                <button class="mode-btn" data-difficulty="2">
                    <span class="mode-name">中等</span>
                    <span class="mode-desc">有一定挑战</span>
                </button>
                <button class="mode-btn" data-difficulty="3">
                    <span class="mode-name">困难</span>
                    <span class="mode-desc">深思熟虑</span>
                </button>
            </div>
            <button class="mode-btn mode-back" id="backFromDifficulty">
                <span class="mode-name">返回</span>
            </button>
        </div>
    </div>

    <!-- 蓝牙对战界面 -->
    <div class="menu-screen hidden" id="bluetoothScreen">
        <div class="menu-card">
            <h2>蓝牙对战</h2>
            <div class="menu-modes">
                <button class="mode-btn" id="btHost">
                    <span class="mode-icon">📡</span>
                    <span class="mode-name">创建房间</span>
                    <span class="mode-desc">等待对手连接</span>
                </button>
                <button class="mode-btn" id="btJoin">
                    <span class="mode-icon">🔍</span>
                    <span class="mode-name">加入房间</span>
                    <span class="mode-desc">搜索附近设备</span>
                </button>
            </div>
            <div class="bt-status" id="btStatus"></div>
            <div class="bt-device-list" id="btDeviceList"></div>
            <button class="mode-btn mode-back" id="backFromBluetooth">
                <span class="mode-name">返回</span>
            </button>
        </div>
    </div>

    <!-- 游戏主界面 -->
    <div class="app hidden" id="gameApp">
        <header class="app-header">
            <h1>中 国 象 棋</h1>
            <p class="subtitle" id="modeLabel">楚河汉界 · 见招拆招</p>
        </header>

        <main class="game-area">
            <!-- 左侧：黑方信息 -->
            <aside class="side-panel black-panel">
                <div class="player-card" id="blackCard">
                    <div class="player-name">黑方</div>
                    <div class="player-status" id="blackStatus">等待</div>
                </div>
                <div class="captured-area">
                    <div class="captured-title">红方俘获</div>
                    <div class="captured-pieces" id="blackCaptured"></div>
                </div>
            </aside>

            <!-- 中间：棋盘 -->
            <div class="board-wrapper">
                <canvas id="board" width="540" height="600"></canvas>
            </div>

            <!-- 右侧：红方信息 + 控制 -->
            <aside class="side-panel red-panel">
                <div class="player-card active" id="redCard">
                    <div class="player-name">红方</div>
                    <div class="player-status" id="redStatus">行棋中</div>
                </div>
                <div class="captured-area">
                    <div class="captured-title">黑方俘获</div>
                    <div class="captured-pieces" id="redCaptured"></div>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" id="restartBtn">重新开始</button>
                    <button class="btn" id="undoBtn">悔棋</button>
                    <button class="btn" id="flipBtn">翻转棋盘</button>
                    <button class="btn" id="soundBtn">🔊 语音开</button>
                    <button class="btn btn-back" id="backToMenu">返回菜单</button>
                </div>
                <div class="move-log">
                    <div class="log-title">棋谱</div>
                    <ol class="log-list" id="moveLog"></ol>
                </div>
            </aside>
        </main>

        <!-- 胜负弹窗 -->
        <div class="modal" id="modal">
            <div class="modal-content">
                <h2 id="modalTitle">胜负已分</h2>
                <p id="modalText"></p>
                <button class="btn btn-primary" id="modalBtn">再来一局</button>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
