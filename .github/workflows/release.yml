name: Build and Sign Release

# 触发条件：推送 v* 开头的 tag 时自动构建，或手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Electron App
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Windows exe (portable + setup)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload unsigned artifacts
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-exe
          path: |
            release/Xiangqi-*-setup-x64.exe
            release/Xiangqi-*-portable-x64.exe

  sign-and-release:
    name: Sign with SignPath & Publish
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download unsigned artifacts
        uses: actions/download-artifact@v4
        with:
          name: unsigned-exe
          path: ./unsigned

      - name: Re-upload for SignPath
        id: upload-sp
        uses: actions/upload-artifact@v4
        with:
          path: ./unsigned
          name: unsigned-for-signpath

      - name: Submit signing request to SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-sp.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ./signed

      - name: List signed files
        run: find ./signed -type f -ls

      - name: Create GitHub Release and Upload Signed Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 中国象棋 ${{ github.ref_name }}
          body: |
            ## 中国象棋 · 楚河汉界 ${{ github.ref_name }}

            完整的中国象棋桌面游戏，基于 Electron 打包，已通过 SignPath 代码签名。

            ### 下载说明

            - **Xiangqi-*-setup-x64.exe** — 安装包，双击安装，自动创建桌面快捷方式和开始菜单
            - **Xiangqi-*-portable-x64.exe** — 轻装版（免安装），双击直接运行，无需安装

            ### 功能特性

            - 完整棋盘和32棋子绘制
            - 7种棋子走法规则（车马炮相士帅兵卒）
            - 将军/将死/飞将判定
            - 悔棋、翻转棋盘、棋谱记录

            ### 系统要求

            - Windows 10/11 (64位)
            - 无需额外依赖，开箱即用

            ### 代码签名

            本版本通过 [SignPath Foundation](https://signpath.org/) 免费代码签名，确保文件未被篡改。
          files: ./signed/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
